<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}} — Hanif Ramadhan</title>
    <meta name="description" content="{{description}}">

    <!-- Open Graph SEO -->
    <meta property="og:type" content="article">
    <meta property="og:title" content="{{title}} — Hanif Ramadhan">
    <meta property="og:description" content="{{description}}">
    <meta property="og:image" content="https://hanif.info/og-image.jpg">
    <meta property="og:url" content="https://hanif.info/{{url_path}}">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{title}} — Hanif Ramadhan">
    <meta name="twitter:description" content="{{description}}">
    <meta name="twitter:image" content="https://hanif.info/og-image.jpg">
    <link rel="stylesheet" href="style.css">

    <!-- Preload Font -->
    <link rel="preload" as="style"
        href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <meta name="view-transition" content="same-origin">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' font-family='sans-serif' font-weight='bold' fill='%231a1a1a'>H</text></svg>">
    <link rel="canonical" href="https://hanif.info/{{filename}}">
</head>

<body>

    <nav class="site-nav" id="top-nav">
        <div class="nav-container">
            <a href="{{backLink}}" class="nav-back">← Back</a>
        </div>
    </nav>

    <main>
        <article class="case-study-container section reveal">

            <header class="case-header">
                <span class="case-meta">{{caseMeta}}</span>
                <h1 class="case-title">{{caseTitle}}</h1>
                <p class="case-subtitle">{{subtitle}}</p>
            </header>

            {{metrics}}

            {{tags}}

            <div class="case-body">
                {{content}}
            </div>

            {{citation}}

        </article>
    </main>

    <footer class="site-footer">
        <div class="container footer-inner">
            <div class="footer-left">
                <span class="footer-time" id="local-time">--:--</span>
                <span class="footer-tz" id="local-tz">Local Time</span>
            </div>
            <div class="footer-center">
                Hanif Ramadhan &mdash; <span id="year">2026</span>
            </div>
            <div class="footer-right">
                Built with <a href="https://antigravity.dev" target="_blank" rel="noopener"
                    style="color:inherit;text-decoration:underline;text-underline-offset:3px;">Antigravity</a> &amp; <a
                    href="https://www.anthropic.com" target="_blank" rel="noopener"
                    style="color:inherit;text-decoration:underline;text-underline-offset:3px;">Claude Code</a>
            </div>
        </div>
    </footer>

    <script src="https://unpkg.com/lenis@1.1.18/dist/lenis.min.js"></script>
    <script type="module" src="js/main.js"></script>
</body>

</html>
