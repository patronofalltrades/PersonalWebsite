<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}} — Hanif Ramadhan</title>
    <meta property="og:description" content="Founder, MBA candidate, and product builder.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://hanif.info/og-image.jpg">
    <meta name="twitter:card" content="summary_large_image">

    <!-- Open Graph SEO -->
    <meta property="og:title" content="{{title}} — Hanif Ramadhan">
    <meta property="og:description" content="{{description}}">
    <meta property="og:type" content="article">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="theme-color" content="#ffffff">

    <!-- Fonts -->

    <!-- Preload Font -->
    <link rel="preload" as="style"
        href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Link to root stylesheet -->
    <link rel="stylesheet" href="../style.css">

    <style>
        .post-content h2,
        .post-content h3 {
            margin-top: 40px;
            margin-bottom: 16px;
            color: var(--text);
        }

        .post-content p {
            margin-bottom: 24px;
            color: var(--text);
        }

        .post-content a {
            color: var(--text);
            text-decoration: underline;
            text-underline-offset: 3px;
        }

        .post-content a:hover {
            color: var(--accent);
        }

        /* Superscript citation styling */
        .post-content sup {
            font-size: 0.6em;
            vertical-align: super;
            line-height: 0;
            position: relative;
            top: -0.3em;
        }

        .post-content sup a {
            text-decoration: none;
            color: var(--text-muted);
            font-weight: 500;
        }

        .post-content sup a:hover {
            color: var(--accent);
        }

        /* Small font for references/footnotes section */
        .post-content span[id^="fn-"] {
            font-size: 0.8rem;
            line-height: 1.6;
        }

        .post-content span[id^="fn-"],
        .post-content span[id^="fn-"]~* {
            font-size: 0.8rem;
            line-height: 1.6;
            color: var(--text-muted);
        }

        .post-content hr~p {
            font-size: 0.8rem;
            line-height: 1.6;
            color: var(--text-muted);
        }
    </style>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' font-family='sans-serif' font-weight='bold' fill='%231a1a1a'>H</text></svg>">
    <link rel="canonical" href="https://hanif.info/template.html">
</head>

<body class="bw-theme">
    <nav class="site-nav">
        <div class="container">
            <div class="nav-inner">
                <a href="../index.html" class="nav-logo">H.R.</a>
                <a href="../index.html#writing" class="nav-link">&larr; Back to Writing</a>
            </div>
        </div>
    </nav>

    <main class="container" style="max-width: 680px; padding-top: 140px; padding-bottom: 100px;">
        <header style="margin-bottom: 56px;">
            <h1
                style="font-size: 2.8rem; font-weight: 500; letter-spacing: -0.03em; margin-bottom: 16px; line-height: 1.1; color: var(--text);">
                {{title}}</h1>
            <p
                style="color: var(--text-muted); font-size: 0.95rem; font-family: var(--font-mono); letter-spacing: 0.05em; text-transform: uppercase;">
                {{date}}</p>
        </header>

        <article class="post-content" style="font-size: 1.1rem; line-height: 1.8;">
            {{content}}
        </article>


    </main>
</body>

</html>
