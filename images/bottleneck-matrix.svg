<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" font-family="Georgia, serif">
  <!-- Background -->
  <rect width="800" height="560" fill="#FAFAF8"/>
  
  <!-- Grid area: 120,60 to 720,460 -->
  <!-- Quadrant fills -->
  <rect x="120" y="60" width="300" height="200" fill="#F0EDE8" stroke="#C8C3BA" stroke-width="1"/>
  <rect x="420" y="60" width="300" height="200" fill="#E8E4DC" stroke="#C8C3BA" stroke-width="1"/>
  <rect x="120" y="260" width="300" height="200" fill="#E8E4DC" stroke="#C8C3BA" stroke-width="1"/>
  <rect x="420" y="260" width="300" height="200" fill="#E0DBD2" stroke="#C8C3BA" stroke-width="1"/>

  <!-- Axis lines -->
  <line x1="120" y1="460" x2="720" y2="460" stroke="#2C2C2C" stroke-width="2"/>
  <line x1="120" y1="60" x2="120" y2="460" stroke="#2C2C2C" stroke-width="2"/>
  
  <!-- Axis arrows -->
  <polygon points="720,460 710,455 710,465" fill="#2C2C2C"/>
  <polygon points="120,60 115,70 125,70" fill="#2C2C2C"/>

  <!-- X-axis label -->
  <text x="420" y="500" text-anchor="middle" font-size="14" fill="#2C2C2C" font-style="italic">Can AI replace the work?</text>
  <text x="160" y="480" text-anchor="start" font-size="11" fill="#8C8780">Low</text>
  <text x="680" y="480" text-anchor="end" font-size="11" fill="#8C8780">High</text>

  <!-- Y-axis label -->
  <text x="40" y="260" text-anchor="middle" font-size="14" fill="#2C2C2C" font-style="italic" transform="rotate(-90, 40, 260)">Does demand grow when costs fall?</text>
  <text x="108" y="440" text-anchor="end" font-size="11" fill="#8C8780">Low</text>
  <text x="108" y="80" text-anchor="end" font-size="11" fill="#8C8780">High</text>

  <!-- Q1: Top-Left (Low replacement, High demand) — Augmentation -->
  <text x="270" y="110" text-anchor="middle" font-size="16" font-weight="bold" fill="#2C2C2C">Q3: Augmentation</text>
  <text x="270" y="135" text-anchor="middle" font-size="12" fill="#5C5850">AI assists, demand expands</text>
  <line x1="210" y1="148" x2="330" y2="148" stroke="#A8A298" stroke-width="0.5"/>
  <text x="270" y="170" text-anchor="middle" font-size="12" fill="#5C5850">Software engineers</text>
  <text x="270" y="190" text-anchor="middle" font-size="12" fill="#5C5850">Creative professionals</text>
  <text x="270" y="218" text-anchor="middle" font-size="11" fill="#8C8780" font-style="italic">More work, not less</text>

  <!-- Q2: Top-Right (High replacement, High demand) — Jevons -->
  <text x="570" y="110" text-anchor="middle" font-size="16" font-weight="bold" fill="#2C2C2C">Q1: Jevons Paradox</text>
  <text x="570" y="135" text-anchor="middle" font-size="12" fill="#5C5850">AI replaces, demand explodes</text>
  <line x1="510" y1="148" x2="630" y2="148" stroke="#A8A298" stroke-width="0.5"/>
  <text x="570" y="170" text-anchor="middle" font-size="12" fill="#5C5850">E-commerce fulfillment</text>
  <text x="570" y="190" text-anchor="middle" font-size="12" fill="#5C5850">Cloud computing</text>
  <text x="570" y="218" text-anchor="middle" font-size="11" fill="#8C8780" font-style="italic">More workers than before</text>

  <!-- Q3: Bottom-Left (Low replacement, Low demand) — Baumol -->
  <text x="270" y="310" text-anchor="middle" font-size="16" font-weight="bold" fill="#2C2C2C">Q4: Cost Disease</text>
  <text x="270" y="335" text-anchor="middle" font-size="12" fill="#5C5850">AI barely helps, costs rise anyway</text>
  <line x1="210" y1="348" x2="330" y2="348" stroke="#A8A298" stroke-width="0.5"/>
  <text x="270" y="370" text-anchor="middle" font-size="12" fill="#5C5850">Teaching</text>
  <text x="270" y="390" text-anchor="middle" font-size="12" fill="#5C5850">Nursing</text>
  <text x="270" y="418" text-anchor="middle" font-size="11" fill="#8C8780" font-style="italic">Baumol, 1966</text>

  <!-- Q4: Bottom-Right (High replacement, Low demand) — Displacement -->
  <text x="570" y="310" text-anchor="middle" font-size="16" font-weight="bold" fill="#2C2C2C">Q2: Displacement</text>
  <text x="570" y="335" text-anchor="middle" font-size="12" fill="#5C5850">AI replaces, demand stays flat</text>
  <line x1="510" y1="348" x2="630" y2="348" stroke="#A8A298" stroke-width="0.5"/>
  <text x="570" y="370" text-anchor="middle" font-size="12" fill="#5C5850">Travel agents</text>
  <text x="570" y="390" text-anchor="middle" font-size="12" fill="#5C5850">Bank tellers</text>
  <text x="570" y="418" text-anchor="middle" font-size="11" fill="#8C8780" font-style="italic">Rarest case, most press</text>

  <!-- Source line -->
  <text x="720" y="545" text-anchor="end" font-size="10" fill="#A8A298">Ramadhan, 2026</text>
</svg>
